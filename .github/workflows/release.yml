name: Créer la release du modpack

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Télécharger packwiz-installer-bootstrap
        run: |
          curl -sL https://github.com/packwiz/packwiz-installer-bootstrap/releases/latest/download/packwiz-installer-bootstrap.jar \
            -o packwiz-installer-bootstrap.jar

      - name: Construire le ZIP de l'instance Prism
        run: |
          mkdir -p "Nouvelle Terre/.minecraft"
          cp packwiz-installer-bootstrap.jar "Nouvelle Terre/.minecraft/"
          cp instance/servers.dat "Nouvelle Terre/.minecraft/"
          cp instance/mmc-pack.json "Nouvelle Terre/"
          cp instance/instance.cfg "Nouvelle Terre/"
          zip -r "Nouvelle Terre.zip" "Nouvelle Terre/"

      - name: Créer la release GitHub
        uses: softprops/action-gh-release@v2
        with:
          tag_name: pack-${{ github.run_number }}
          name: "Nouvelle Terre — Modpack"
          body: |
            ## Installation

            1. Télécharge **`Nouvelle Terre.zip`** ci-dessous
            2. Dans Prism Launcher → **Ajouter une instance** → **Importer** → sélectionne le ZIP
            3. Lance l'instance — les mods se téléchargent automatiquement au premier lancement

            > Les mises à jour sont automatiques, tu n'as pas à retélécharger ce fichier.
          files: "Nouvelle Terre.zip"
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
